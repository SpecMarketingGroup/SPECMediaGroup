<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Thank You | SPEC Media Group</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&display=swap" rel="stylesheet"/>
<style>
  :root { --gold:#F5A800; --black:#111111; --dark:#1a1a1a; --gray:#888888; --white:#ffffff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--black); color:var(--white); font-family:'Barlow',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; padding:40px; }
  .wrap { max-width:600px; }
  .checkmark { font-size:4rem; margin-bottom:24px; }
  h1 { font-family:'Anton',sans-serif; font-size:3rem; letter-spacing:3px; text-transform:uppercase; color:var(--white); margin-bottom:16px; }
  h1 span { color:var(--gold); }
  p { font-size:1rem; font-weight:300; color:rgba(255,255,255,0.7); line-height:1.8; margin-bottom:40px; }
  a { display:inline-block; background:var(--gold); color:var(--black); padding:16px 36px; font-size:0.82rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; text-decoration:none; }
  a:hover { opacity:0.9; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="checkmark">✅</div>
    <h1>Message <span>Sent!</span></h1>
    <p>Thank you for reaching out to SPEC Media Group. We'll get back to you within 24 business hours to discuss your project and next steps.</p>
    <a href="index.html">Back To Home</a>
  </div>
</body>
</html>
